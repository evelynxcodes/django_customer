{% extends 'customers/base.html' %}

{% block content %}
<p><a class="btn" href="{% url 'customer_create' %}">+ Add customer</a></p>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Address</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for customer in customers %}
        <tr>
            <td>{{ customer.name }}</td>
            <td>{{ customer.email }}</td>
            <td>{{ customer.phone }}</td>
            <td>{{ customer.address }}</td>
            <td class="actions">
                <a href="{% url 'customer_update' customer.pk %}">Edit</a>
                <a href="{% url 'customer_delete' customer.pk %}">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="5">No customers yet.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
