{% extends 'customers/base.html' %}

{% block content %}
<h2>Delete customer</h2>
<p>Are you sure you want to delete <strong>{{ customer.name }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button class="btn" type="submit">Yes, delete</button>
    <a class="btn secondary" href="{% url 'customer_list' %}">Cancel</a>
</form>
{% endblock %}
